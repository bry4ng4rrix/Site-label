<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <path id="top-arc" d="M 20,100 A 80,80 0 0,1 180,100"/>
    <path id="bottom-arc" d="M 35,130 A 75,75 0 0,0 165,130"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1E3FAB" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1E3FAB" stroke-width="1.5"/>

  <!-- Top text: LABEL TECHNOLOGY -->
  <text font-family="'Arial', sans-serif" font-weight="800" font-size="13.5" fill="#1E3FAB" letter-spacing="3">
    <textPath href="#top-arc" startOffset="8%">LABEL TECHNOLOGY</textPath>
  </text>

  <!-- Bottom text: Consulting & Services -->
  <text font-family="'Arial', sans-serif" font-weight="600" font-size="11" fill="#1E3FAB" letter-spacing="1.5">
    <textPath href="#bottom-arc" startOffset="10%">Consulting &amp; Services</textPath>
  </text>

  <!-- Stars left and right -->
  <text x="18" y="105" font-size="10" fill="#1E3FAB" text-anchor="middle">★</text>
  <text x="182" y="105" font-size="10" fill="#1E3FAB" text-anchor="middle">★</text>

  <!-- LT Monogram -->
  <!-- L -->
  <rect x="58" y="62" width="9" height="42" rx="1" fill="#1E3FAB"/>
  <rect x="58" y="95" width="26" height="9" rx="1" fill="#1E3FAB"/>
  <!-- T -->
  <rect x="90" y="62" width="40" height="9" rx="1" fill="#1E3FAB"/>
  <rect x="105" y="62" width="9" height="42" rx="1" fill="#1E3FAB"/>

  <!-- Small chip/circuit icon below LT -->
  <rect x="86" y="109" width="28" height="18" rx="2" fill="none" stroke="#1E3FAB" stroke-width="1.8"/>
  <line x1="91" y1="109" x2="91" y2="105" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="97" y1="109" x2="97" y2="105" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="103" y1="109" x2="103" y2="105" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="109" y1="109" x2="109" y2="105" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="91" y1="127" x2="91" y2="131" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="97" y1="127" x2="97" y2="131" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="103" y1="127" x2="103" y2="131" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="109" y1="127" x2="109" y2="131" stroke="#1E3FAB" stroke-width="1.5"/>
</svg>
